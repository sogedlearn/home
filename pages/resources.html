<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources | SOGED — Indigenous Language Learning</title>
    <link rel="icon" type="image/png" href="../Multimedia/Images/Soged/Newturttle.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/resources-boutique.css">
    <link rel="stylesheet" href="../css/dark-mode-fixes.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'boutique-coral': '#e8756a',
                        'boutique-coral-hover': '#d4655a',
                        'boutique-bg': '#f7f7f7',
                        'boutique-border': '#ececec',
                        'absolute-black': '#000000',
                    },
                    fontFamily: {
                        display: ['Fredoka', 'Georgia', 'serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'boutique': '0 8px 30px rgba(0, 0, 0, 0.08)',
                        'boutique-hover': '0 16px 40px rgba(0, 0, 0, 0.14)',
                    },
                },
            },
        };
    </script>
</head>
<body class="resources-boutique-page font-body antialiased">

    <div id="header-component"></div>

    <!-- Hero -->
    <section class="pt-32 pb-10 md:pt-36 md:pb-14 bg-white border-b border-boutique-border">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center">
            <h1 class="font-display text-4xl sm:text-5xl font-bold text-absolute-black tracking-tight mb-4">
                Learning Resources
            </h1>
            <p class="text-base sm:text-lg text-absolute-black/55 max-w-xl mx-auto leading-relaxed">
                Discover comprehensive materials to master the Guna language
            </p>
        </div>
    </section>

    <!-- Filter Bar -->
    <section class="bg-boutique-bg py-8 md:py-10 border-b border-boutique-border">
        <div class="max-w-6xl mx-auto px-4 sm:px-6">
            <div class="resources-filter-bar flex flex-col sm:flex-row items-stretch sm:items-center gap-3 sm:gap-4">
                <div class="flex-1 min-w-0">
                    <label for="categoryFilter" class="sr-only">Category</label>
                    <select id="categoryFilter" class="w-full h-12 px-4 bg-white border border-boutique-border rounded-lg text-absolute-black/80 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-boutique-coral/30 focus:border-boutique-coral transition-all cursor-pointer">
                        <option value="all">All Category</option>
                        <option value="vocabulary">Vocabulary</option>
                        <option value="grammar">Grammar</option>
                        <option value="audio">Audio</option>
                        <option value="video">Video</option>
                        <option value="docs">Documents</option>
                        <option value="culture">Culture</option>
                    </select>
                </div>
                <div class="flex-1 min-w-0">
                    <label for="levelFilter" class="sr-only">Level</label>
                    <select id="levelFilter" class="w-full h-12 px-4 bg-white border border-boutique-border rounded-lg text-absolute-black/80 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-boutique-coral/30 focus:border-boutique-coral transition-all cursor-pointer">
                        <option value="all">All Levels</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                        <option value="all levels">All Levels</option>
                    </select>
                </div>
                <div class="flex-[1.4] min-w-0 flex gap-2">
                    <label for="searchInput" class="sr-only">Search resources</label>
                    <input
                        type="text"
                        id="searchInput"
                        class="flex-1 h-12 px-4 bg-white border border-boutique-border rounded-lg text-absolute-black text-sm placeholder:text-absolute-black/40 focus:outline-none focus:ring-2 focus:ring-boutique-coral/30 focus:border-boutique-coral transition-all"
                        placeholder="Search Guna resources, vocabulary, grammar..."
                    >
                    <button type="button" id="searchBtn" class="h-12 px-5 sm:px-7 bg-boutique-coral hover:bg-boutique-coral-hover text-white text-sm font-bold rounded-lg transition-all duration-300 flex items-center gap-2 whitespace-nowrap shadow-sm hover:shadow-md">
                        <i class="fas fa-search text-xs" aria-hidden="true"></i>
                        <span class="hidden sm:inline">Find Resource</span>
                        <span class="sm:hidden">Find</span>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Resources Grid -->
    <section class="py-10 md:py-12 bg-boutique-bg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h2 class="font-display text-xl sm:text-2xl font-bold text-absolute-black text-center mb-8">
                Popular Resources
            </h2>

            <div id="resourcesGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-5 lg:gap-6">
                <!-- Cards rendered by resources.js -->
            </div>

            <div class="text-center mt-8 md:mt-10">
                <button type="button" id="loadMoreBtn" class="inline-flex items-center gap-2 px-6 py-2.5 border-2 border-absolute-black/15 text-absolute-black font-bold text-xs rounded-lg bg-white hover:border-boutique-coral hover:text-boutique-coral transition-all duration-300">
                    <i class="fas fa-plus text-xs" aria-hidden="true"></i>
                    Load More Resources
                </button>
            </div>
        </div>
    </section>

    <!-- Resource Modal -->
    <div id="resource-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="resource-modal-title">
        <div id="resource-modal" tabindex="-1">
            <button type="button" class="modal-close-btn" aria-label="Close" onclick="closeResourceModal();">&times;</button>
            <div id="resource-modal-body" class="p-8 sm:p-10 flex flex-col items-center">
                <img id="resource-modal-image" src="" alt="" class="max-w-full max-h-48 rounded-xl mb-5 object-cover shadow-md hidden">
                <h3 id="resource-modal-title"></h3>
                <div id="resource-modal-text" class="text-left sm:text-center"></div>
            </div>
        </div>
    </div>

    <script>
    var RESOURCE_MODAL_CONTENT = {
      'guna-phrases': {
        title: 'Common Guna Phrases',
        text: 'Start your Guna journey with everyday expressions used across the islands of Guna Yala. These phrases help you greet others, ask simple questions, and take part in daily conversation with warmth and respect.',
        html: '<p>Essential phrases to know:</p><ul style="text-align:left; margin:1rem auto; max-width:420px; padding-left:1.25rem;"><li><strong>¡ anna !</strong> — Hello (most common greeting)</li><li><strong>¡ naa !</strong> — Hi (informal)</li><li><strong>Na an mar</strong> — I am here</li><li><strong>Be an mar?</strong> — Are you here?</li><li><strong>Bia?</strong> — Where?</li><li><strong>Doa?</strong> — Who?</li><li><strong>Eye</strong> — Yes</li></ul><p>Guna greetings often acknowledge community and presence — especially after arriving by cayuco (canoe) to an island.</p>'
      },
      'guna-dictionary': {
        title: 'Guna English Dictionary',
        text: 'A complete bilingual reference connecting Dulegaya (Guna) with English. It includes pronunciation guides, everyday vocabulary, and cultural notes that help learners understand words in their real context — not just as translations.',
        html: '<p style="margin-bottom:0.75rem;">What you\'ll find inside:</p><ul style="text-align:left; margin:0 auto 1rem; max-width:420px; padding-left:1.25rem;"><li>Guna ↔ English word entries</li><li>Pronunciation guides for each term</li><li>Everyday vocabulary for conversation</li><li>Cultural context for key expressions</li></ul><p>Ideal for learners at any level who want a reliable reference while studying Guna language and culture.</p>'
      },
      'guna-art': {
        title: 'Guna Art — The Mola',
        image: '../Multimedia/Images/Molas - Guna/Mola 1.jpg',
        imageAlt: 'Traditional Guna mola textile art',
        text: 'The mola is one of the most recognized forms of Guna art — a handmade textile created by Guna women using reverse-appliqué.',
        html: '<p style="margin-bottom:1rem;">Artisans layer colored fabric and carefully cut away shapes to reveal vibrant geometric patterns, animals, plants, and symbols from nature. Each mola tells a story and is worn with pride as an expression of Guna identity.</p><p style="margin:0;">No two molas are alike — every design is an original work passed down through generations of women artisans in Guna Yala.</p>'
      },
      'guna-pronunciation': {
        title: 'Guna Pronunciation Guide',
        text: 'Practice key Guna sounds with native speaker audio. Listen carefully to the rhythm and soft consonants — pronunciation is essential for being understood in Dulegaya.',
        html: '<p style="margin-bottom:1rem;">Available audio examples:</p><ul style="text-align:left; margin:0 auto; max-width:420px; padding-left:0; list-style:none;"><li style="margin-bottom:1rem;"><strong>degidde</strong> — Hello (variant)<br><span style="font-size:0.9rem;">Pronunciation: "deh-gee-deh"</span><br><audio controls style="width:100%; margin-top:0.5rem;"><source src="../Multimedia/Audio/degidde.mp3" type="audio/mpeg"></audio></li><li style="margin-bottom:1rem;"><strong>degi malo</strong> — Goodbye<br><span style="font-size:0.9rem;">A warm farewell in daily conversation</span><br><audio controls style="width:100%; margin-top:0.5rem;"><source src="../Multimedia/Audio/Degi malo.mp3" type="audio/mpeg"></audio></li><li style="margin-bottom:0;"><strong>Banmalo</strong> — See you tomorrow<br><span style="font-size:0.9rem;">Used when parting until the next day</span><br><audio controls style="width:100%; margin-top:0.5rem;"><source src="../Multimedia/Audio/Banmalo.mp3" type="audio/mpeg"></audio></li></ul>'
      }
    };

    function openResourceModal(resourceKey) {
      var content = RESOURCE_MODAL_CONTENT[resourceKey];
      if (!content) return;

      var titleEl = document.getElementById('resource-modal-title');
      var textEl = document.getElementById('resource-modal-text');
      var imageEl = document.getElementById('resource-modal-image');
      var overlay = document.getElementById('resource-modal-overlay');

      if (titleEl) titleEl.textContent = content.title;

      if (textEl) {
        if (content.html) {
          textEl.innerHTML = (content.text ? '<p style="margin-bottom:1rem;">' + content.text + '</p>' : '') + content.html;
        } else {
          textEl.textContent = content.text || '';
        }
      }

      if (imageEl) {
        if (content.image) {
          imageEl.alt = content.imageAlt || content.title;
          imageEl.classList.remove('hidden');
          imageEl.onerror = function() { this.classList.add('hidden'); };
          imageEl.src = content.image;
        } else {
          imageEl.classList.add('hidden');
          imageEl.removeAttribute('src');
        }
      }

      if (overlay) overlay.classList.add('is-open');
    }

    function closeResourceModal() {
      var overlay = document.getElementById('resource-modal-overlay');
      var audios = document.querySelectorAll('#resource-modal-text audio');
      audios.forEach(function(audio) { audio.pause(); });
      if (overlay) overlay.classList.remove('is-open');
    }

    window.openResourceModal = openResourceModal;
    window.closeResourceModal = closeResourceModal;

    document.addEventListener('DOMContentLoaded', function() {
      var overlay = document.getElementById('resource-modal-overlay');
      if (overlay) {
        overlay.addEventListener('click', function(e) {
          if (e.target === overlay) closeResourceModal();
        });
      }
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeResourceModal();
      });
    });
    </script>

    <cta-section id="resources-cta"></cta-section>
    <div id="footer-component"></div>

    <script src="../js/components.js"></script>
    <script src="../components/cta-section.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/resources-data.js"></script>
    <script src="../js/resources.js"></script>
    <script src="../main.js"></script>
</body>
</html>
